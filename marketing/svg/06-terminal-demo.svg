<svg width="1200" height="750" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00ADD8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#00ADD8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="750" fill="url(#bgGrad)"/>
  <rect width="1200" height="750" fill="url(#glow)"/>

  <!-- Brand lockup -->
  <circle cx="66" cy="60" r="22" fill="#00ADD8"/>
  <rect x="56" y="52" width="20" height="2.6" rx="1" fill="#ffffff" fill-opacity="0.9"/>
  <rect x="56" y="57" width="20" height="2.6" rx="1" fill="#ffffff" fill-opacity="0.7"/>
  <rect x="56" y="62" width="20" height="2.6" rx="1" fill="#ffffff" fill-opacity="0.5"/>
  <rect x="56" y="67" width="20" height="2.6" rx="1" fill="#ffffff" fill-opacity="0.3"/>
  <text x="98" y="68" font-family="Liberation Sans, Arial, sans-serif" font-size="26" font-weight="bold" fill="#ffffff">Goca</text>
  <text x="1134" y="68" font-family="Liberation Sans, Arial, sans-serif" font-size="20" fill="#ffffff" fill-opacity="0.5" text-anchor="end">One command. Four layers.</text>

  <!-- Terminal window -->
  <rect x="60" y="110" width="1080" height="580" rx="16" fill="#0d1117" stroke="#00ADD8" stroke-opacity="0.35" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect x="60" y="110" width="1080" height="44" rx="16" fill="#161b22"/>
  <rect x="60" y="138" width="1080" height="16" fill="#161b22"/>
  <circle cx="92" cy="132" r="7" fill="#ff5f56"/>
  <circle cx="116" cy="132" r="7" fill="#ffbd2e"/>
  <circle cx="140" cy="132" r="7" fill="#27c93f"/>
  <text x="600" y="137" font-family="Liberation Mono, monospace" font-size="16" fill="#8b949e" text-anchor="middle">goca &#8212; zsh</text>

  <!-- Terminal body -->
  <g font-family="Liberation Mono, monospace" font-size="21" fill="#c9d1d9">
    <text x="92" y="200"><tspan fill="#27c93f">$</tspan> goca feature Order --fields "id:string,total:float64" --db postgres</text>

    <text x="92" y="244" fill="#00D9FF">&#10003; Domain layer generated       internal/domain/order.go</text>
    <text x="92" y="276" fill="#00D9FF">&#10003; Use case layer generated     internal/usecase/order_usecase.go</text>
    <text x="92" y="308" fill="#00D9FF">&#10003; Repository generated         internal/repository/postgres/order_repository.go</text>
    <text x="92" y="340" fill="#00D9FF">&#10003; HTTP handler generated       internal/handler/http/order_handler.go</text>
    <text x="92" y="372" fill="#00D9FF">&#10003; Integration tests generated  internal/tests/order_test.go</text>
    <text x="92" y="372"/>
    <text x="92" y="418" fill="#8b949e">Dependency injection wired. Clean Architecture rules validated.</text>

    <text x="92" y="470"><tspan fill="#3fb950" font-weight="bold">Feature 'Order' ready in 1.4s</tspan></text>

    <text x="92" y="520"><tspan fill="#27c93f">$</tspan> tree internal -L 2</text>
    <text x="110" y="554" fill="#8b949e">internal</text>
    <text x="110" y="582" fill="#8b949e">&#9500;&#9472;&#9472; domain/          <tspan fill="#00ADD8">// pure entities, no dependencies</tspan></text>
    <text x="110" y="610" fill="#8b949e">&#9500;&#9472;&#9472; usecase/         <tspan fill="#00ADD8">// business rules + DTOs</tspan></text>
    <text x="110" y="638" fill="#8b949e">&#9500;&#9472;&#9472; repository/      <tspan fill="#00ADD8">// persistence, swappable</tspan></text>
    <text x="110" y="666" fill="#8b949e">&#9492;&#9472;&#9472; handler/         <tspan fill="#00ADD8">// HTTP / gRPC / CLI adapters</tspan></text>
  </g>
</svg>
