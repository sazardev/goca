<svg width="1080" height="1920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="28%" r="45%">
      <stop offset="0%" stop-color="#00ADD8" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#00ADD8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wordmark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ADD8"/>
      <stop offset="100%" stop-color="#00D9FF"/>
    </linearGradient>
    <linearGradient id="ctaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ADD8"/>
      <stop offset="100%" stop-color="#00758F"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1920" fill="url(#bgGrad)"/>
  <rect width="1080" height="1920" fill="url(#glow)"/>

  <!-- Brand lockup -->
  <circle cx="90" cy="170" r="28" fill="#00ADD8"/>
  <rect x="76" y="159" width="26" height="3.4" rx="1" fill="#ffffff" fill-opacity="0.9"/>
  <rect x="76" y="166" width="26" height="3.4" rx="1" fill="#ffffff" fill-opacity="0.7"/>
  <rect x="76" y="173" width="26" height="3.4" rx="1" fill="#ffffff" fill-opacity="0.5"/>
  <rect x="76" y="180" width="26" height="3.4" rx="1" fill="#ffffff" fill-opacity="0.3"/>
  <text x="132" y="180" font-family="Liberation Sans, Arial, sans-serif" font-size="34" font-weight="bold" fill="#ffffff">Goca</text>

  <!-- Large center logo mark -->
  <circle cx="540" cy="500" r="182" fill="#00ADD8" fill-opacity="0.08"/>
  <circle cx="540" cy="500" r="140" fill="#00ADD8"/>
  <rect x="475" y="463" width="130" height="14" rx="4" fill="#ffffff" fill-opacity="0.9"/>
  <rect x="475" y="489" width="130" height="14" rx="4" fill="#ffffff" fill-opacity="0.7"/>
  <rect x="475" y="515" width="130" height="14" rx="4" fill="#ffffff" fill-opacity="0.5"/>
  <rect x="475" y="541" width="130" height="14" rx="4" fill="#ffffff" fill-opacity="0.3"/>

  <!-- Wordmark -->
  <text x="540" y="790" font-family="Liberation Sans, Arial, sans-serif" font-size="130" font-weight="bold" fill="url(#wordmark)" text-anchor="middle">Goca</text>

  <!-- Tagline -->
  <text x="540" y="848" font-family="Liberation Sans, Arial, sans-serif" font-size="36" font-weight="600" fill="#00D9FF" text-anchor="middle">Go Clean Architecture,</text>
  <text x="540" y="896" font-family="Liberation Sans, Arial, sans-serif" font-size="36" font-weight="600" fill="#00D9FF" text-anchor="middle">generated in seconds</text>

  <!-- Description -->
  <text x="540" y="960" font-family="Liberation Sans, Arial, sans-serif" font-size="27" fill="#ffffff" fill-opacity="0.75" text-anchor="middle">Domain, use cases, repositories and handlers</text>
  <text x="540" y="996" font-family="Liberation Sans, Arial, sans-serif" font-size="27" fill="#ffffff" fill-opacity="0.75" text-anchor="middle">scaffolded with best practices baked in.</text>

  <!-- Command chip -->
  <rect x="130" y="1060" width="820" height="76" rx="16" fill="#000000" fill-opacity="0.35" stroke="#00ADD8" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="540" y="1107" font-family="Liberation Mono, monospace" font-size="24" fill="#00D9FF" text-anchor="middle">$ go install github.com/sazardev/goca@latest</text>

  <!-- Badges -->
  <g font-family="Liberation Sans, Arial, sans-serif" font-size="20" font-weight="600">
    <rect x="150" y="1180" width="230" height="52" rx="12" fill="#00ADD8" fill-opacity="0.14" stroke="#00ADD8" stroke-width="1.5"/>
    <text x="265" y="1214" fill="#00D9FF" text-anchor="middle">Clean Architecture</text>

    <rect x="400" y="1180" width="190" height="52" rx="12" fill="#00ADD8" fill-opacity="0.14" stroke="#00ADD8" stroke-width="1.5"/>
    <text x="495" y="1214" fill="#00D9FF" text-anchor="middle">Zero Config</text>

    <rect x="610" y="1180" width="250" height="52" rx="12" fill="#00ADD8" fill-opacity="0.14" stroke="#00ADD8" stroke-width="1.5"/>
    <text x="735" y="1214" fill="#00D9FF" text-anchor="middle">Production Ready</text>
  </g>

  <!-- CTA -->
  <rect x="310" y="1560" width="460" height="92" rx="46" fill="url(#ctaGrad)"/>
  <text x="540" y="1618" font-family="Liberation Sans, Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle">Get Goca free</text>

  <!-- Swipe up hint -->
  <path d="M525 1740 L540 1720 L555 1740" fill="none" stroke="#ffffff" stroke-opacity="0.5" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="540" y="1800" font-family="Liberation Sans, Arial, sans-serif" font-size="28" fill="#ffffff" fill-opacity="0.55" text-anchor="middle">sazardev.github.io/goca</text>
</svg>
