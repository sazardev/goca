version: "2"
run:
  concurrency: 4
  issues-exit-code: 1
  tests: true
  allow-parallel-runners: true
linters:
  default: all
  disable:
    - asciicheck
    - cyclop
    - depguard
    - exhaustruct
    - gochecknoglobals
    - gochecknoinits
    - godox
    - lll
    - mnd
    - nestif
    - nlreturn
    - tagliatelle
    - varnamelen
    - wrapcheck
    - wsl
    # Linters newly introduced in golangci-lint v2 (the toolchain auto-enables
    # them via `default: all`). They were never part of this codebase's lint
    # contract, so they are disabled to keep behavior aligned with the prior
    # effective configuration.
    - wsl_v5
    - noinlineerr
    - modernize
    - funcorder
    - godoclint
    - godot
    - dupword
    - importas
    - noctx
    - unqueryvet
    - perfsprint
  settings:
    decorder:
      disable-dec-num-check: true
      disable-dec-order-check: false
      disable-init-func-first-check: false
    dupl:
      threshold: 80
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    exhaustruct:
      include:
        - .*
      exclude:
        - .*_test\.go
    forbidigo:
      forbid:
        - pattern: ^fmt\.Print.*$
        - pattern: ^print.*$
        - pattern: ^println.*$
        - pattern: ^spew\..*$
      exclude-godoc-examples: true
    funlen:
      lines: 50
      statements: 40
      ignore-comments: true
    gocognit:
      min-complexity: 20
    goconst:
      min-len: 2
      min-occurrences: 3
    gocritic:
      disabled-checks:
        - commentFormatting
        - paramTypeCombine
        - whyNoLint
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    gocyclo:
      min-complexity: 15
    godot:
      scope: declarations
      capital: true
      period: true
    gomoddirectives:
      replace-local: true
      exclude-forbidden: true
    gosec:
      excludes:
        - G101
        - G204
        - G304
        - G402
        - G505
      severity: low
      confidence: low
    govet:
      disable:
        - fieldalignment
        - shadow
      enable-all: true
    importas:
      alias:
        - pkg: github.com/sazardev/goca/internal/domain
          alias: domain
      no-unaliased: true
    ireturn:
      allow:
        - anon
        - error
        - empty
        - stdlib
        - domain\..*Entity
        - domain\..*DTO
    makezero:
      always: true
    nakedret:
      max-func-lines: 0
    nestif:
      min-complexity: 4
    nilnil:
      checked-types:
        - ptr
        - func
        - iface
        - map
        - chan
    nolintlint:
      require-explanation: true
      require-specific: true
      allow-unused: false
    nonamedreturns:
      report-error-in-defer: true
    paralleltest:
      ignore-missing: false
    perfsprint:
      strconcat: false
    prealloc:
      simple: true
      range-loops: true
      for-loops: true
    predeclared:
      qualified-name: true
    reassign:
      patterns:
        - .*
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id
    rowserrcheck:
      packages:
        - github.com/jmoiron/sqlx
        - database/sql
    sloglint:
      no-mixed-args: true
      kv-only: false
      attr-only: false
      no-global: all
      context: all
    staticcheck:
      checks:
        - all
    tagliatelle:
      case:
        rules:
          avro: snake
          bson: camel
          json: snake
          mapstructure: kebab
          xml: camel
          yaml: kebab
    thelper:
      test:
        first: true
        name: true
        begin: true
      benchmark:
        first: true
        name: true
        begin: true
      tb:
        first: true
        name: true
        begin: true
    unparam:
      check-exported: true
    usestdlibvars:
      http-method: true
      http-status-code: true
      time-weekday: true
      time-month: true
      time-layout: true
      crypto-hash: true
      default-rpc-path: true
      sql-isolation-level: true
      tls-signature-scheme: true
      constant-kind: true
    whitespace:
      multi-if: true
      multi-func: true
  exclusions:
    generated: lax
    rules:
      # Generated mock example tests intentionally set struct fields that are
      # only used to demonstrate the mock setup, which govet flags as unused
      # writes.
      - linters:
          - govet
        text: unusedwrite
        path: internal/mocks/examples/
      - linters:
          - bodyclose
          - cyclop
          - dupl
          - err113
          - funlen
          - gocognit
          - goconst
          - gocyclo
          - maintidx
          - noctx
          - paralleltest
          - prealloc
          - rowserrcheck
          - sqlclosecheck
          - thelper
          - unparam
        path: _test\.go
      - linters:
          - dupl
          - errcheck
          - funlen
          - gocognit
          - gocritic
          - gosec
          - nestif
          - prealloc
          - revive
          - testpackage
          - unparam
        path: internal/
      - linters:
          - errcheck
          - goconst
          - gocritic
          - gosec
          - revive
          - testifylint
          - testpackage
          - tparallel
          - usetesting
        path: cmd/.*_test\.go
      - linters:
          - decorder
          - dupl
          - errcheck
          - errchkjson
          - funlen
          - gocognit
          - goconst
          - gocritic
          - gocyclo
          - gosec
          - iface
          - ineffassign
          - makezero
          - nestif
          - nlreturn
          - nolintlint
          - prealloc
          - predeclared
          - revive
          - staticcheck
          - testifylint
          - testpackage
          - thelper
          - unparam
          - usetesting
        path: internal/
      - linters:
          - err113
          - errcheck
          - exhaustruct
          - forcetypeassert
          - gochecknoglobals
          - revive
          - unparam
          - unused
        path: internal/mocks/
      - linters:
          - cyclop
          - dupl
          - err113
          - forbidigo
          - funlen
          - gocognit
          - gocyclo
          - maintidx
          - paralleltest
        path: internal/testing/
      - linters:
          - decorder
          - dupl
          - err113
          - errcheck
          - forbidigo
          - funlen
          - gochecknoglobals
          - gocognit
          - goconst
          - gocritic
          - gocyclo
          - gosec
          - ifshort
          - ineffassign
          - makezero
          - nestif
          - nolintlint
          - nonamedreturns
          - prealloc
          - predeclared
          - revive
          - staticcheck
          - unparam
          - wastedassign
        path: cmd/
      - linters:
          - ireturn
        path: \.go$
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
severity:
  default: error
  rules:
    - linters:
        - godot
        - misspell
      severity: info
formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/sazardev/goca)
    gofumpt:
      module-path: github.com/sazardev/goca
      extra-rules: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
